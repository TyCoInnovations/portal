<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TyCo Bookmarks</title>
  <link rel="icon" type="image/png" sizes="1920x1920" href="portal/images/favicon.png?v=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Variables ── */
    :root {
      --green:   #3ecf74;
      --blue:    #3b82f6;
      --bg:      #0d0f14;
      --surface: #141720;
      --s2:      #1c2030;
      --border:  rgba(255,255,255,0.07);
      --text:    #e8eaf0;
      --muted:   #6b7385;
      --r:       16px;
      --f:       'Outfit', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--f);
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: grid;
      grid-template-rows: 49px 1fr;
    }

    /* ambient glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 45% at 8% 15%,  rgba(62,207,116,0.055) 0%, transparent 55%),
        radial-gradient(ellipse 45% 55% at 92% 85%, rgba(59,130,246,0.055) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,15,20,0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      height: 49px;
    }

    .logo {
      font-weight: 700;
      font-size: 1.1rem;
      background: linear-gradient(110deg, var(--green), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      white-space: nowrap;
    }

    /* centred greeting */
    #header-greeting {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      text-align: center;
      white-space: nowrap;
    }

    #header-greeting span {
      background: linear-gradient(110deg, var(--green), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 600;
    }

    /* clock sits right-aligned */
    .header-right {
      display: flex;
      justify-content: flex-end;
    }

    #clock {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.2px;
    }

    /* ── Responsive and mobile-friendly main grid ── */
    main {
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: 1fr;
      gap: 12px;
      padding: 12px 14px 12px;
      height: calc(100vh - 49px);
      overflow: hidden;
    }
    #right-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: width 0.4s, min-width 0.4s, max-width 0.4s, right 0.4s;
      min-width: 0;
      width: 320px;
      max-width: 100vw;
      position: relative;
      will-change: width;
      background: transparent;
    }
    .right-toggle {
      position: absolute;
      left: -36px;
      top: 20px;
      z-index: 101;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      width: 28px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .right-toggle .toggle-ico::before {
      content: '🡸';
      font-size: 1.2em;
      transition: transform 0.18s;
      display: block;
      line-height: 1;
    }
    #right-section.minimised {
      width: 0 !important;
      min-width: 0 !important;
      max-width: 0 !important;
      overflow: hidden;
    }
    #right-section.minimised .right-toggle .toggle-ico::before {
      content: '🡺';
    }

    .card {
      min-width: 0;
      width: 100%;
      box-sizing: border-box;
    }

    /* Responsive widgets: adapt height based on screen size */
    #wbox-weather, #wbox-stocks {
      height: 88px;
    }
    @media (max-width: 1000px) {
      #wbox-weather, #wbox-stocks {
        height: 62px;
      }
    }
    @media (max-width: 600px) {
      #wbox-weather, #wbox-stocks {
        height: 46vw;
        min-height: 44px;
        max-height: 240px;
      }
    }

    /* Mobile layout: stack right panel and bookmarks vertically, right panel full width, auto-minimise */
    @media (max-width: 800px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        height: auto;
        padding: 7px 3px;
      }
      #right-section {
        width: 100vw;
        min-width: 0;
        max-width: 100vw;
        position: fixed;
        right: 0;
        top: 49px;
        z-index: 90;
        box-shadow: -3px 0 10px rgba(0,0,0,0.18);
        background: var(--bg);
        padding: 0 3vw;
        transition: right 0.4s, width 0.4s;
      }
      #right-section.minimised {
        right: -110vw;
        width: 100vw;
      }
      #bookmarks-card {
        grid-row: unset;
        min-height: 180px;
      }
    }
    /* Hide toggle button on desktop */
    @media (min-width: 801px) {
      .right-toggle { display: none; }
    }

    /* ...rest of CSS unchanged... */
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="logo"> Bookmarks</div>
    <div id="header-greeting">Good morning, <span id="uname-display">there</span></div>
    <div class="header-right">
      <span id="clock">00:00:00</span>
    </div>
  </header>

  <!-- ── Main ── -->
  <main>
    <!-- Bookmarks (left/primary) -->
    <div class="card" id="bookmarks-card">
      <div class="card-label">Bookmarks</div>
      <div class="bm-grid" id="bm-grid">
        <!-- populated by JS -->
      </div>
    </div>

    <!-- Right section: Search + Widgets (now minimisable) -->
    <div id="right-section" class="right-section expanded">
      <button id="toggle-right" aria-label="Toggle side panel" class="right-toggle">
        <span class="toggle-ico"></span>
      </button>
      <!-- Search -->
      <div class="card" id="search-card">
        ...
      </div>
      <!-- Widgets -->
      <div class="card" id="widgets-card">
        ...
      </div>
    </div>
  </main>

  <!-- ── Name prompt overlay (first visit) ── -->
  ...
  <!-- ── Add bookmark overlay ── -->
  ...
  <script>
  // [Keep rest of JS as in previous version]

  // ── Minimisable right section (search + widgets) ──
  const rightSection = document.getElementById('right-section');
  const rightToggle = document.getElementById('toggle-right');

  function setRightMin(state) {
    if (state) {
      rightSection.classList.add('minimised');
    } else {
      rightSection.classList.remove('minimised');
    }
  }

  // Toggle on button
  rightToggle.addEventListener('click', function() {
    setRightMin(!rightSection.classList.contains('minimised'));
  });

  // Auto-minimise on mobile on load and resize
  function autoMinOnMobile() {
    if (window.innerWidth <= 800) {
      setRightMin(true);
    } else {
      setRightMin(false);
    }
  }
  window.addEventListener('resize', autoMinOnMobile);
  autoMinOnMobile();
  </script>

</body>
</html>
