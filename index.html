<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TyCo Bookmarks</title>
  <link rel="icon" type="image/png" sizes="1920x1920" href="portal/images/favicon.png?v=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Variables ── */
    :root {
      --green:   #3ecf74;
      --blue:    #3b82f6;
      --bg:      #0d0f14;
      --surface: #141720;
      --s2:      #1c2030;
      --border:  rgba(255,255,255,0.07);
      --text:    #e8eaf0;
      --muted:   #6b7385;
      --r:       16px;
      --f:       'Outfit', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--f);
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: grid;
      grid-template-rows: 49px 1fr;
    }

    /* ambient glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 45% at 8% 15%,  rgba(62,207,116,0.055) 0%, transparent 55%),
        radial-gradient(ellipse 45% 55% at 92% 85%, rgba(59,130,246,0.055) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,15,20,0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      height: 49px;
    }

    .logo {
      font-weight: 700;
      font-size: 1.1rem;
      background: linear-gradient(110deg, var(--green), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      white-space: nowrap;
    }

    /* centred greeting */
    #header-greeting {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      text-align: center;
      white-space: nowrap;
    }

    #header-greeting span {
      background: linear-gradient(110deg, var(--green), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 600;
    }

    /* clock sits right-aligned */
    .header-right {
      display: flex;
      justify-content: flex-end;
    }

    #clock {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.2px;
    }

    /* ── Main grid ── */
    main {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 300px;
      grid-template-rows: 1fr 220px;
      gap: 12px;
      padding: 12px 14px 12px;
      height: calc(100vh - 49px);
      overflow: hidden;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      overflow: hidden;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      user-select: none;
    }

    /* ── Bookmarks card ── */
    #bookmarks-card {
      grid-column: 1;
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      animation-delay: 0.04s;
    }

    .bm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(76px, 1fr));
      gap: 7px;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      align-content: start;
      padding-right: 2px;
      /* extra bottom padding so last row isn't clipped */
      padding-bottom: 6px;
    }

    .bm-grid::-webkit-scrollbar { width: 3px; }
    .bm-grid::-webkit-scrollbar-track { background: transparent; }
    .bm-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.09); border-radius: 3px; }

    .bookmark {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 5px;
      border-radius: 11px;
      text-decoration: none;
      color: var(--text);
      background: var(--s2);
      border: 1px solid var(--border);
      transition: background 0.18s, border-color 0.18s, transform 0.14s;
      cursor: pointer;
      /* prevent text selection on click */
      user-select: none;
      -webkit-user-select: none;
    }

    .bookmark:hover {
      background: rgba(62,207,116,0.07);
      border-color: rgba(62,207,116,0.22);
      transform: translateY(-2px);
    }

    /* favicon wrapper */
    .bm-icon {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .bm-icon img {
      width: 26px;
      height: 26px;
      object-fit: contain;
      border-radius: 4px;
      display: block;
    }

    .bm-fallback {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      line-height: 1;
      user-select: none;
    }

    .bookmark .bm-label {
      font-size: 0.62rem;
      font-weight: 500;
      text-align: center;
      color: var(--muted);
      line-height: 1.2;
      max-width: 68px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color 0.14s;
    }

    .bookmark:hover .bm-label { color: var(--text); }

    /* delete button */
    .del-btn {
      position: absolute;
      top: -5px;
      right: -5px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ef4444;
      border: 2px solid var(--bg);
      color: #fff;
      font-size: 7px;
      line-height: 1;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      transition: background 0.15s;
    }

    .bookmark:hover .del-btn { display: flex; }
    .del-btn:hover { background: #dc2626; }

    /* add tile */
    .add-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 5px;
      border-radius: 11px;
      background: transparent;
      border: 1px dashed rgba(62,207,116,0.22);
      color: var(--green);
      font-size: 0.62rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
      font-family: var(--f);
      user-select: none;
    }

    .add-tile:hover {
      background: rgba(62,207,116,0.06);
      border-color: rgba(62,207,116,0.42);
    }

    .add-tile .plus {
      font-size: 1.15rem;
      line-height: 1;
      font-weight: 300;
    }

    /* ── Search card ── */
    #search-card {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      animation-delay: 0.09s;
    }

    .search-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .search-ico {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.75rem;
      pointer-events: none;
      line-height: 1;
    }

    #search-input {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: var(--f);
      font-size: 0.82rem;
      padding: 9px 11px 9px 32px;
      outline: none;
      transition: border-color 0.18s;
    }

    #search-input:focus { border-color: rgba(62,207,116,0.32); }
    #search-input::placeholder { color: var(--muted); }

    .stags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
      flex-shrink: 0;
    }

    .stag {
      font-size: 0.65rem;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--s2);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
      font-family: var(--f);
      user-select: none;
    }

    .stag:hover {
      background: rgba(62,207,116,0.08);
      border-color: rgba(62,207,116,0.26);
      color: var(--green);
    }

    #suggestions {
      margin-top: 6px;
      border-radius: 9px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: none;
      flex-shrink: 0;
    }

    .sug-item {
      padding: 7px 11px;
      font-size: 0.76rem;
      cursor: pointer;
      color: var(--muted);
      background: var(--s2);
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background 0.14s, color 0.14s;
      user-select: none;
    }

    .sug-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }

    /* ── Widgets card ── */
    #widgets-card {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation-delay: 0.14s;
      /* fixed height = 220px via grid row */
    }

    .wbox {
      border-radius: 10px;
      overflow: hidden;
      background: #080a0e;
      border: 1px solid var(--border);
      position: relative;
      flex-shrink: 0;
    }

    /* Weather: compact fixed height */
    #wbox-weather {
      height: 88px;
    }

    #wbox-weather .tomorrow {
      width: 100%;
      height: 100%;
    }

    /* Stocks: fills remaining space */
    #wbox-stocks {
      flex: 1;
      min-height: 0;
    }

    #wbox-stocks .tv-wrap,
    #wbox-stocks .tv-wrap > div {
      width: 100%;
      height: 100%;
    }

    /* ── Modals shared base ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.68);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 24px;
      width: 340px;
      max-width: 92vw;
      animation: fadeUp 0.2s ease;
    }

    .modal-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 0.98rem;
      font-weight: 700;
      background: linear-gradient(110deg, var(--green), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .modal-x {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      width: 26px;
      height: 26px;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
      font-family: var(--f);
    }

    .modal-x:hover { color: var(--text); }

    .modal-sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .mfield {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: var(--f);
      font-size: 0.84rem;
      padding: 10px 12px;
      outline: none;
      margin-bottom: 8px;
      transition: border-color 0.18s;
    }

    .mfield:focus { border-color: rgba(62,207,116,0.32); }
    .mfield::placeholder { color: var(--muted); }

    .mbtn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 9px;
      background: linear-gradient(110deg, var(--green), var(--blue));
      color: #0d0f14;
      font-family: var(--f);
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 2px;
      transition: opacity 0.18s, transform 0.14s;
    }

    .mbtn:hover { opacity: 0.88; transform: translateY(-1px); }
    .mbtn:active { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="logo">TyCo Bookmarks</div>
    <div id="header-greeting">Good morning, <span id="uname-display">there</span></div>
    <div class="header-right">
      <span id="clock">00:00:00</span>
    </div>
  </header>

  <!-- ── Main ── -->
  <main>

    <!-- Bookmarks -->
    <div class="card" id="bookmarks-card">
      <div class="card-label">Bookmarks</div>
      <div class="bm-grid" id="bm-grid">
        <!-- populated by JS -->
      </div>
    </div>

    <!-- Search -->
    <div class="card" id="search-card">
      <div class="card-label">Search</div>
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input id="search-input" type="text" placeholder="Search with StartPage…" autocomplete="off" spellcheck="false">
      </div>
      <div class="stags">
        <button class="stag" data-q="weather forecast">Weather</button>
        <button class="stag" data-q="news today">News</button>
        <button class="stag" data-q="trending topics">Trending</button>
        <button class="stag" data-q="local events near me">Events</button>
        <button class="stag" data-q="tech news">Tech</button>
        <button class="stag" data-q="entertainment news">Entertainment</button>
      </div>
      <div id="suggestions" role="listbox" aria-label="Search suggestions"></div>
    </div>

    <!-- Widgets -->
    <div class="card" id="widgets-card">
      <div class="card-label">Widgets</div>

      <!-- Weather -->
      <div class="wbox" id="wbox-weather">
        <script>
          (function(d,s,id){
            if (d.getElementById(id)) {
              if (window.__TOMORROW__) window.__TOMORROW__.renderWidget();
              return;
            }
            var js = d.createElement(s);
            js.id = id;
            js.src = 'https://www.tomorrow.io/v1/widget/sdk/sdk.bundle.min.js';
            d.head.appendChild(js);
          })(document, 'script', 'tomorrow-sdk');
        </script>
        <div class="tomorrow"
          data-location-id=""
          data-language="EN"
          data-unit-system="METRIC"
          data-skin="dark"
          data-widget-type="upcoming"
          style="padding-bottom:14px; position:relative; height:100%; width:100%;">
          <a href="https://weather.tomorrow.io/" rel="noopener noreferrer" target="_blank"
             style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);">
            <img alt="Powered by Tomorrow.io"
                 src="https://weather-website-client.tomorrow.io/img/powered-by.svg"
                 width="130" height="11" loading="lazy">
          </a>
        </div>
      </div>

      <!-- Stocks (TradingView) -->
      <div class="wbox" id="wbox-stocks">
        <div class="tv-wrap">
          <div class="tradingview-widget-container" style="height:100%;width:100%;">
            <div class="tradingview-widget-container__widget" style="height:100%;width:100%;"></div>
            <script type="text/javascript"
              src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js"
              async>
            {
              "symbols": [
                ["Apple","AAPL|1D"],
                ["Google","GOOGL|1D"],
                ["Microsoft","MSFT|1D"],
                ["Bitcoin","BITSTAMP:BTCUSD|1D"],
                ["Tesla","NASDAQ:TSLA|1D"],
                ["McDonald's","NYSE:MCD|1D"]
              ],
              "chartOnly": false,
              "width": "100%",
              "height": "100%",
              "locale": "en",
              "colorTheme": "dark",
              "autosize": true,
              "showVolume": false,
              "showMA": false,
              "hideDateRanges": false,
              "hideMarketStatus": false,
              "hideSymbolLogo": false,
              "scalePosition": "right",
              "scaleMode": "Normal",
              "fontFamily": "Outfit, -apple-system, sans-serif",
              "fontSize": "10",
              "noTimeScale": false,
              "valuesTracking": "1",
              "changeMode": "price-and-percent",
              "chartType": "area",
              "lineWidth": 2,
              "lineType": 0
            }
            </script>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- ── Name prompt overlay (first visit) ── -->
  <div class="overlay" id="name-overlay">
    <div class="modal">
      <div class="modal-hdr">
        <div class="modal-title">Welcome to TyCo Bookmarks</div>
      </div>
      <p class="modal-sub">What should we call you? We'll save your name for future visits.</p>
      <input class="mfield" id="name-input" type="text" placeholder="Your name" maxlength="40" autocomplete="given-name">
      <button class="mbtn" id="name-save">Let's go →</button>
    </div>
  </div>

  <!-- ── Add bookmark overlay ── -->
  <div class="overlay" id="bm-overlay">
    <div class="modal">
      <div class="modal-hdr">
        <div class="modal-title">Add Bookmark</div>
        <button class="modal-x" id="bm-close" aria-label="Close">✕</button>
      </div>
      <input class="mfield" id="bm-name" type="text" placeholder="Name  (e.g. GitHub)" maxlength="40" autocomplete="off">
      <input class="mfield" id="bm-url"  type="url"  placeholder="URL  (e.g. https://github.com)" autocomplete="off">
      <button class="mbtn" id="bm-add">Add Bookmark</button>
    </div>
  </div>

  <script>
  /* ================================================================
     TyCo Bookmarks — Production JS
     All localStorage keys:
       tyco_name       → user's display name (string)
       tyco_bm_v3      → bookmarks JSON array
  ================================================================ */

  // ── Utils ────────────────────────────────────────────────────────

  function lsGet(key) {
    try { return localStorage.getItem(key); } catch(e) { return null; }
  }

  function lsSet(key, val) {
    try { localStorage.setItem(key, val); } catch(e) {}
  }

  function normaliseUrl(raw) {
    raw = (raw || '').trim();
    if (!raw) return '';
    if (/^https?:\/\//i.test(raw)) return raw;
    return 'https://' + raw;
  }

  function getOrigin(url) {
    try { return new URL(url).origin; } catch(e) { return null; }
  }

  // ── Name / greeting ──────────────────────────────────────────────

  const NAME_KEY = 'tyco_name';

  function getGreeting() {
    const h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 18) return 'Good afternoon';
    return 'Good evening';
  }

  function applyName(name) {
    document.getElementById('uname-display').textContent = name || 'there';
    // update greeting word too (in case called outside clock tick)
    const greetEl = document.getElementById('header-greeting');
    // rebuild text node before the <span>
    greetEl.childNodes[0].textContent = getGreeting() + ', ';
  }

  // Show name-prompt on first visit (no saved name)
  const nameOverlay = document.getElementById('name-overlay');
  const nameInput   = document.getElementById('name-input');
  const nameSave    = document.getElementById('name-save');

  function initName() {
    const saved = lsGet(NAME_KEY);
    if (saved) {
      applyName(saved);
    } else {
      nameOverlay.classList.add('open');
      nameInput.focus();
    }
  }

  function saveName() {
    const val = nameInput.value.trim();
    if (!val) { nameInput.focus(); return; }
    lsSet(NAME_KEY, val);
    applyName(val);
    nameOverlay.classList.remove('open');
  }

  nameSave.addEventListener('click', saveName);
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveName(); });

  // ── Clock (every second) ─────────────────────────────────────────

  function tickClock() {
    const now = new Date();
    // update greeting word in case hour boundary crossed
    const greetEl = document.getElementById('header-greeting');
    if (greetEl.childNodes.length) {
      greetEl.childNodes[0].textContent = getGreeting() + ', ';
    }
    document.getElementById('clock').textContent =
      now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  tickClock();
  setInterval(tickClock, 1000);

  // ── Bookmarks data ───────────────────────────────────────────────

  const BM_KEY = 'tyco_bm_v3';

  const DEFAULTS = [
    { name: 'TyCo',           url: 'https://sites.google.com/view/tyco-me/home' },
    { name: 'Google',         url: 'https://www.google.com' },
    { name: 'YouTube',        url: 'https://www.youtube.com' },
    { name: 'GitHub',         url: 'https://github.com' },
    { name: 'ChatGPT',        url: 'https://chat.openai.com' },
    { name: 'Netflix',        url: 'https://www.netflix.com' },
    { name: 'Amazon',         url: 'https://www.amazon.com' },
    { name: 'Spotify',        url: 'https://www.spotify.com' },
    { name: 'Outlook',        url: 'https://outlook.live.com' },
    { name: 'MSN',            url: 'https://www.msn.com' },
    { name: 'Canva',          url: 'https://www.canva.com' },
    { name: 'Zoom',           url: 'https://zoom.us' },
    { name: 'Creative Cloud', url: 'https://www.adobe.com/creativecloud.html' },
    { name: 'M365',           url: 'https://www.office.com' },
  ];

  function loadBM() {
    try {
      const raw = lsGet(BM_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.length > 0) return parsed;
      }
    } catch(e) {}
    return DEFAULTS.map(b => ({ ...b }));
  }

  function saveBM() {
    lsSet(BM_KEY, JSON.stringify(bookmarks));
  }

  let bookmarks = loadBM();

  // ── Favicon ──────────────────────────────────────────────────────

  function makeFallback() {
    const d = document.createElement('div');
    d.className = 'bm-fallback';
    d.textContent = '?';
    d.setAttribute('aria-hidden', 'true');
    return d;
  }

  function createIcon(url) {
    const wrap = document.createElement('div');
    wrap.className = 'bm-icon';

    const origin = getOrigin(url);
    if (!origin) { wrap.appendChild(makeFallback()); return wrap; }

    // Google favicon service: reliable, CORS-safe, returns 16×16 blank if missing
    const img = document.createElement('img');
    img.alt = '';
    img.loading = 'lazy';
    img.src = 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(origin) + '&sz=64';

    img.onload = function() {
      // 16px or smaller → Google sent the blank placeholder; try direct favicon.ico
      if (this.naturalWidth <= 16) {
        const img2 = document.createElement('img');
        img2.alt = '';
        img2.loading = 'lazy';
        img2.src = origin + '/favicon.ico';
        img2.onload = function() {
          if (this.naturalWidth > 1) {
            img2.className = img.className;
            wrap.innerHTML = '';
            wrap.appendChild(img2);
          } else {
            wrap.innerHTML = '';
            wrap.appendChild(makeFallback());
          }
        };
        img2.onerror = function() {
          wrap.innerHTML = '';
          wrap.appendChild(makeFallback());
        };
      }
    };

    img.onerror = function() {
      wrap.innerHTML = '';
      wrap.appendChild(makeFallback());
    };

    wrap.appendChild(img);
    return wrap;
  }

  // ── Render bookmarks ─────────────────────────────────────────────

  function renderBM() {
    const grid = document.getElementById('bm-grid');
    grid.innerHTML = '';

    bookmarks.forEach(function(bm, i) {
      const a = document.createElement('a');
      a.href = bm.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.className = 'bookmark';
      a.setAttribute('aria-label', bm.name);

      const label = document.createElement('span');
      label.className = 'bm-label';
      label.textContent = bm.name;

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '✕';
      del.title = 'Remove ' + bm.name;
      del.setAttribute('aria-label', 'Remove ' + bm.name);
      del.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        bookmarks.splice(i, 1);
        saveBM();
        renderBM();
      });

      a.appendChild(createIcon(bm.url));
      a.appendChild(label);
      a.appendChild(del);
      grid.appendChild(a);
    });

    // add tile
    const tile = document.createElement('button');
    tile.className = 'add-tile';
    tile.setAttribute('aria-label', 'Add bookmark');
    tile.innerHTML = '<span class="plus">+</span><span>Add</span>';
    tile.addEventListener('click', openBmModal);
    grid.appendChild(tile);
  }

  // ── Add-bookmark modal ───────────────────────────────────────────

  const bmOverlay = document.getElementById('bm-overlay');
  const bmClose   = document.getElementById('bm-close');
  const bmNameEl  = document.getElementById('bm-name');
  const bmUrlEl   = document.getElementById('bm-url');
  const bmAdd     = document.getElementById('bm-add');

  function openBmModal() {
    bmNameEl.value = '';
    bmUrlEl.value  = '';
    bmOverlay.classList.add('open');
    bmNameEl.focus();
  }

  function closeBmModal() {
    bmOverlay.classList.remove('open');
  }

  bmClose.addEventListener('click', closeBmModal);

  bmOverlay.addEventListener('click', function(e) {
    if (e.target === bmOverlay) closeBmModal();
  });

  bmAdd.addEventListener('click', function() {
    const name = bmNameEl.value.trim();
    const url  = normaliseUrl(bmUrlEl.value);
    if (!name || !url) {
      if (!name) bmNameEl.focus();
      else bmUrlEl.focus();
      return;
    }
    bookmarks.push({ name, url });
    saveBM();
    renderBM();
    closeBmModal();
  });

  // Enter key on URL field submits
  bmUrlEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') bmAdd.click();
  });
  // Enter key on name field moves to URL
  bmNameEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') bmUrlEl.focus();
  });

  // ── Search ───────────────────────────────────────────────────────

  const SEARCH_BASE = 'https://www.startpage.com/do/search?q=';

  function searchFor(q) {
    if (!q) return;
    window.open(SEARCH_BASE + encodeURIComponent(q), '_blank', 'noopener,noreferrer');
  }

  // tag buttons
  document.querySelectorAll('.stag').forEach(function(btn) {
    btn.addEventListener('click', function() {
      searchFor(this.dataset.q);
    });
  });

  const searchInput = document.getElementById('search-input');
  const suggestEl   = document.getElementById('suggestions');

  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const q = searchInput.value.trim();
      if (q) { searchFor(q); searchInput.value = ''; suggestEl.style.display = 'none'; }
    }
    if (e.key === 'Escape') {
      suggestEl.style.display = 'none';
      suggestEl.innerHTML = '';
    }
  });

  const SUGGESTIONS = [
    'Weather today', 'News headlines', 'Trending topics',
    'Popular searches', 'Tech news', 'Local events', 'Entertainment'
  ];

  searchInput.addEventListener('input', function() {
    const v = this.value.trim().toLowerCase();
    if (!v) { suggestEl.style.display = 'none'; suggestEl.innerHTML = ''; return; }
    const hits = SUGGESTIONS.filter(s => s.toLowerCase().includes(v));
    if (!hits.length) { suggestEl.style.display = 'none'; suggestEl.innerHTML = ''; return; }
    suggestEl.style.display = 'block';
    suggestEl.innerHTML = hits.map(function(s) {
      return '<div class="sug-item" role="option" tabindex="0">🔍 ' +
        s.replace(/</g, '&lt;') + '</div>';
    }).join('');
    suggestEl.querySelectorAll('.sug-item').forEach(function(el) {
      el.addEventListener('click', function() {
        searchFor(el.textContent.replace('🔍 ', '').trim());
        searchInput.value = '';
        suggestEl.style.display = 'none';
        suggestEl.innerHTML = '';
      });
    });
  });

  // close suggestions when clicking outside
  document.addEventListener('click', function(e) {
    if (!searchInput.contains(e.target) && !suggestEl.contains(e.target)) {
      suggestEl.style.display = 'none';
    }
  });

  // ── Kick off ─────────────────────────────────────────────────────
  renderBM();
  initName();
  </script>
</body>
</html>
